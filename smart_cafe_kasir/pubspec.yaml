name: smart_cafe_kasir
description: Smart Cafe Cashier App
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter


  # HTTP & API
  http: ^1.1.0
  dio: ^5.4.0


  # MQTT & NFC
  mqtt_client: ^10.2.0
  flutter_nfc_kit: ^3.5.0

  # State Management
  provider: ^6.1.1

  # UI
  flutter_svg: ^2.0.9
  google_fonts: ^6.1.0

  # Utils
  intl: ^0.20.2
  shared_preferences: ^2.2.2
  flutter_launcher_icons: ^0.14.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true
  assets:
    - assets/ca.pem

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/icon_1.png"
  min_sdk_android: 21